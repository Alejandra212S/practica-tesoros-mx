<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Tesoros escondidos en México</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url("img/inicio2.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .contenedor-registro {
            width: 420px;
            background: rgba(255, 255, 255, 0.92);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        .contenedor-registro h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #111;
            font-size: 28px;
        }

        .contenedor-registro label {
            display: block;
            margin-bottom: 8px;
            color: #111;
            font-weight: bold;
            font-size: 16px;
        }

        .contenedor-registro input {
            width: 100%;
            padding: 13px;
            margin-bottom: 18px;
            border: 2px solid #00695c;
            border-radius: 9px;
            outline: none;
            font-size: 15px;
            background-color: transparent;
            color: #111;
        }

        .contenedor-registro input:focus {
            border-color: #004d40;
            box-shadow: 0 0 6px rgba(0, 105, 92, 0.4);
        }

        #mensajeRegistro {
            display: none;
            margin: 5px 0 18px 0;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
        }

        #mensajeRegistro.exito {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #mensajeRegistro.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .contenedor-registro button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background-color: #08262f;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .contenedor-registro button:hover {
            background-color: #00695c;
        }

        .login-link {
            margin-top: 22px;
            text-align: center;
            font-size: 16px;
            color: #111;
        }

        .login-link a {
            color: #00695c;
            font-weight: bold;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .contenedor-registro {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="contenedor-registro">
        <h1>Crear cuenta</h1>

        <form id="formRegistro">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre" required>

            <label for="correo">Correo electrónico</label>
            <input type="text" id="correo" placeholder="ejemplo123@gmail.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Escribe tu contraseña" required>

            <div id="mensajeRegistro"></div>

            <button type="submit">Registrarse</button>
        </form>

        <p class="login-link">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión aquí</a>
        </p>
    </div>
     <script type="module" src="registro.js"></script>
  
</body>
</html>
